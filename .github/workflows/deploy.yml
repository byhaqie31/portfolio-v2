name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/portfolio-v2
            git pull origin main
            docker compose up -d --build

            # Wait for MySQL to be healthy before pruning
            echo "Waiting for MySQL to be healthy..."
            for i in $(seq 1 30); do
              if docker inspect portfolio-mysql --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
                echo "MySQL is healthy"
                break
              fi
              sleep 2
            done

            # Verify app is responding
            sleep 3
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "App is running"
            else
              echo "WARNING: App may not be responding"
              docker logs portfolio --tail 20
            fi

            docker image prune -f
