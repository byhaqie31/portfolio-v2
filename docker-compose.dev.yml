services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: portfolio-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=portfolio_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=portfolio_db
      - ADMIN_SECRET=${ADMIN_SECRET}
      - BASE_URL=${BASE_URL}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    networks:
      - axelnova-shared

networks:
  axelnova-shared:
    external: true
