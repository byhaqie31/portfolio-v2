services:
  portfolio:
    build: .
    container_name: portfolio
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=portfolio_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=portfolio_db
      - ADMIN_SECRET=${ADMIN_SECRET}
      - BASE_URL=${BASE_URL}
    networks:
      - axelnova-shared

# MySQL + phpMyAdmin moved to the shared axelnova-infra stack.
# DB_HOST=mysql still works because the shared MySQL service is also named `mysql`
# on the axelnova-shared network — DNS resolution is identical.
# See: https://github.com/byhaqie31/axelnova-infra
networks:
  axelnova-shared:
    name: axelnova-shared
    external: true
